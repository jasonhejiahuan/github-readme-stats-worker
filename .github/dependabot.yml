version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: 'deps'
    groups:
      cloudflare:
        patterns:
          - 'wrangler'
          - '@cloudflare/*'
      linting:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - '@typescript-eslint/*'
          - 'typescript-eslint'
          - 'globals'
      testing:
        patterns:
          - 'vitest'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: 'ci'
    groups:
      github-actions:
        patterns:
          - '*'
